<!doctype html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Javascript CRUD</title>
    <link rel="stylesheet" href="java2.css">
</head>
<body>
<form class="container">
    <div>
        <label for="nev">Név</label><br>
        <input type="text" id="nev" name="nev" required />
    </div>
    <div>
        <label for="nem">Nem</label><br>
        <select id="nem" name="nem" required>
            <option value="F">Férfi</option>
            <option value="N">Nő</option>
        </select>
    </div>
    <div>
        <label for="szuldatum">Szül dátum</label><br>
        <input type="date" id="szuldatum" name="szuldatum" required />
    </div>
    <div>
        <label for="nemzet">Nemzet</label><br>
        <input type="text" id="nemzet" name="nemzet" />
    </div>
    <div id="gombok">
        <button type="button" onclick="hozzaadas()">Új rekord</button>
    </div>
</form>
<table>
    <thead>
    <tr>
        <th>Az</th><th>Név</th><th>Nem</th><th>Szül dátum</th><th>Nemzet</th>
    </tr>
    </thead>
    <tbody id="adatok"></tbody>
</table>

<script src="fetch5.js"></script>
</body>
</html>
