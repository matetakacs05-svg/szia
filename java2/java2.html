<!doctype html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Javascript CRUD</title>
    <link rel="stylesheet" href="java2.css">
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="bgv.mp4" type="video/mp4" />
    </video>
    <div class="content">
        <form class="container">
            <div>
                <label for="datum">Dátum</label>
                <input type="date" id="datum" name="datum" />
            </div>
            <div>
                <label for="nev">Név</label>
                <input type="text" id="nev" name="nev" />
            </div>
            <div>
                <label for="helyszin">Helyszín</label>
                <input type="text" id="helyszin" name="helyszin" />
            </div>
            <div id="gombok">
                <button type="button" onclick="hozzaadas()">Új rekord</button>
            </div>
        </form>
        <div class = "table-cont">
            <table>
                <thead>
                <tr>
                    <th>Dátum</th><th>Név</th><th>Helyszín</th><th>Akciók <br></th>
                </tr>
                </thead>
                <tbody id="adatok"></tbody>
            </table>
        </div>
    </div>

<script src="java2.js"></script>
</body>
</html>
